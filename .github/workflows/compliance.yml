name: RISC-V Compliance Suite

on:
  workflow_dispatch:   # manual trigger only - click "Run workflow" on GitHub
  push:
    paths:
      - 'rtl/**'        # only auto-run when RTL actually changes

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rv32i-pipeline
        uses: actions/checkout@v4

      - name: Install RISC-V toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-riscv64-unknown-elf verilator

      - name: Clone riscv-arch-test
        run: |
          git clone --branch old-framework-2.x --depth 1 \
            https://github.com/riscv-non-isa/riscv-arch-test.git ~/riscv-arch-test

      - name: Build simulator
        run: make clean && make all

      - name: Run compliance suite
        run: |
          cd compliance
          sed -i 's|~/projects/riscv-arch-test|~/riscv-arch-test|' run_compliance.sh
          sed -i 's|~/projects/rv32i-pipeline|'"$GITHUB_WORKSPACE"'|g' run_compliance.sh
          ./run_compliance.sh
